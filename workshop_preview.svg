<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1920 1080" width="1920" height="1080">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="50%" style="stop-color:#111827"/>
      <stop offset="100%" style="stop-color:#0a0e17"/>
    </linearGradient>
    <linearGradient id="orangeGlow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b35"/>
      <stop offset="100%" style="stop-color:#ff4500"/>
    </linearGradient>
    <linearGradient id="cardGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2035"/>
      <stop offset="100%" style="stop-color:#0d1220"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="bigGlow">
      <feGaussianBlur stdDeviation="20" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="softGlow">
      <feGaussianBlur stdDeviation="40" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <clipPath id="card1Clip"><rect x="460" y="420" width="200" height="280" rx="8"/></clipPath>
    <clipPath id="card2Clip"><rect x="860" y="380" width="200" height="280" rx="8"/></clipPath>
    <clipPath id="card3Clip"><rect x="1260" y="420" width="200" height="280" rx="8"/></clipPath>
  </defs>

  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#bg)"/>

  <!-- Ambient glow effects -->
  <ellipse cx="960" cy="500" rx="700" ry="400" fill="#ff6b35" opacity="0.03" filter="url(#softGlow)"/>
  <ellipse cx="960" cy="200" rx="500" ry="200" fill="#ff6b35" opacity="0.05" filter="url(#softGlow)"/>

  <!-- Diagonal decorative lines -->
  <line x1="0" y1="0" x2="400" y2="1080" stroke="#ff6b35" stroke-width="1" opacity="0.08"/>
  <line x1="200" y1="0" x2="600" y2="1080" stroke="#ff6b35" stroke-width="1" opacity="0.05"/>
  <line x1="1520" y1="0" x2="1920" y2="1080" stroke="#ff6b35" stroke-width="1" opacity="0.08"/>
  <line x1="1720" y1="0" x2="1320" y2="1080" stroke="#ff6b35" stroke-width="1" opacity="0.05"/>

  <!-- Top decorative bar -->
  <rect x="360" y="80" width="1200" height="2" fill="url(#orangeGlow)" opacity="0.6"/>
  <rect x="460" y="86" width="1000" height="1" fill="#ff6b35" opacity="0.3"/>

  <!-- Main Title -->
  <text x="960" y="160" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="82" font-weight="900" fill="#ff6b35" letter-spacing="8" filter="url(#bigGlow)">TURBO</text>
  <text x="960" y="260" text-anchor="middle" font-family="Arial Black, Impact, sans-serif" font-size="72" font-weight="900" fill="#ffffff" letter-spacing="12">RANDOM DEATHMATCH</text>

  <!-- Subtitle line -->
  <rect x="560" y="290" width="800" height="2" fill="url(#orangeGlow)" opacity="0.4"/>

  <!-- Tagline -->
  <text x="960" y="340" text-anchor="middle" font-family="Georgia, serif" font-size="32" fill="#aaaaaa" font-style="italic" letter-spacing="4">Die. Choose your next hero. Fight again.</text>

  <!-- Three hero cards -->
  <!-- Card 1 (left, slightly lower) -->
  <g transform="rotate(-8, 560, 560)">
    <rect x="460" y="420" width="200" height="280" rx="8" fill="url(#cardGrad)" stroke="#3a4560" stroke-width="2"/>
    <!-- Hero silhouette placeholder -->
    <rect x="475" y="435" width="170" height="180" rx="4" fill="#151d30"/>
    <!-- Sword icon -->
    <g transform="translate(530, 510)" fill="#4a5880" opacity="0.6">
      <polygon points="30,0 35,80 30,90 25,80"/>
      <rect x="15" y="75" width="30" height="8" rx="2"/>
      <rect x="25" y="83" width="10" height="15" rx="2"/>
    </g>
    <text x="560" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#667090" font-weight="bold">HERO 1</text>
    <rect x="490" y="665" width="140" height="3" rx="1" fill="#ff6b35" opacity="0.3"/>
  </g>

  <!-- Card 2 (center, raised, highlighted) -->
  <g>
    <rect x="855" y="375" width="210" height="290" rx="8" fill="url(#cardGrad)" stroke="#ff6b35" stroke-width="3" filter="url(#glow)"/>
    <!-- Hero silhouette placeholder -->
    <rect x="872" y="392" width="176" height="186" rx="4" fill="#1a2540"/>
    <!-- Shield icon -->
    <g transform="translate(928, 460)" fill="#ff6b35" opacity="0.5">
      <path d="M0,-40 L35,-25 L35,15 L0,40 L-35,15 L-35,-25 Z" stroke="#ff6b35" stroke-width="2" fill="none"/>
      <path d="M0,-25 L20,-15 L20,8 L0,25 L-20,8 L-20,-15 Z" fill="#ff6b35" opacity="0.15"/>
    </g>
    <text x="960" y="615" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#ff6b35" font-weight="bold">YOUR PICK</text>
    <rect x="890" y="630" width="140" height="3" rx="1" fill="#ff6b35" opacity="0.6"/>
    <!-- Selection arrow -->
    <polygon points="960,365 945,345 975,345" fill="#ff6b35" filter="url(#glow)"/>
  </g>

  <!-- Card 3 (right, slightly lower) -->
  <g transform="rotate(8, 1360, 560)">
    <rect x="1260" y="420" width="200" height="280" rx="8" fill="url(#cardGrad)" stroke="#3a4560" stroke-width="2"/>
    <!-- Hero silhouette placeholder -->
    <rect x="1275" y="435" width="170" height="180" rx="4" fill="#151d30"/>
    <!-- Staff icon -->
    <g transform="translate(1335, 505)" fill="#4a5880" opacity="0.6">
      <rect x="-3" y="0" width="6" height="90" rx="2"/>
      <circle cx="0" cy="-5" r="15" fill="none" stroke="#4a5880" stroke-width="3"/>
      <circle cx="0" cy="-5" r="5" fill="#4a5880" opacity="0.4"/>
    </g>
    <text x="1360" y="650" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#667090" font-weight="bold">HERO 3</text>
    <rect x="1290" y="665" width="140" height="3" rx="1" fill="#ff6b35" opacity="0.3"/>
  </g>

  <!-- Circular arrows between cards (swap/cycle symbol) -->
  <!-- Left arrow -->
  <path d="M 700 540 Q 780 480 850 520" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.5" stroke-dasharray="8,4"/>
  <polygon points="850,520 840,508 832,525" fill="#ff6b35" opacity="0.5"/>
  <!-- Right arrow -->
  <path d="M 1080 520 Q 1150 480 1230 540" fill="none" stroke="#ff6b35" stroke-width="2" opacity="0.5" stroke-dasharray="8,4"/>
  <polygon points="1230,540 1218,530 1225,548" fill="#ff6b35" opacity="0.5"/>

  <!-- "CHOOSE 3" badge -->
  <g transform="translate(960, 790)">
    <rect x="-120" y="-35" width="240" height="70" rx="35" fill="#ff6b35" opacity="0.15" stroke="#ff6b35" stroke-width="2"/>
    <text x="0" y="8" text-anchor="middle" font-family="Arial Black, sans-serif" font-size="30" fill="#ff6b35" font-weight="900" filter="url(#glow)">CHOOSE FROM 3</text>
  </g>

  <!-- Feature bullets -->
  <g font-family="Arial, sans-serif" font-size="22" fill="#8892a8">
    <!-- Left features -->
    <g transform="translate(240, 880)">
      <circle cx="0" cy="-7" r="5" fill="#ff6b35" opacity="0.7"/>
      <text x="18" y="0">2x Gold &amp; XP</text>
    </g>
    <g transform="translate(240, 920)">
      <circle cx="0" cy="-7" r="5" fill="#ff6b35" opacity="0.7"/>
      <text x="18" y="0">Keep Your Items</text>
    </g>

    <!-- Center feature -->
    <g transform="translate(830, 880)">
      <circle cx="0" cy="-7" r="5" fill="#ff6b35" opacity="0.7"/>
      <text x="18" y="0">New Hero Every Death</text>
    </g>
    <g transform="translate(830, 920)">
      <circle cx="0" cy="-7" r="5" fill="#ff6b35" opacity="0.7"/>
      <text x="18" y="0">Turbo Speed</text>
    </g>

    <!-- Right features -->
    <g transform="translate(1400, 880)">
      <circle cx="0" cy="-7" r="5" fill="#ff6b35" opacity="0.7"/>
      <text x="18" y="0">Free TP Scrolls</text>
    </g>
    <g transform="translate(1400, 920)">
      <circle cx="0" cy="-7" r="5" fill="#ff6b35" opacity="0.7"/>
      <text x="18" y="0">Up to 5v5</text>
    </g>
  </g>

  <!-- Bottom decorative bar -->
  <rect x="360" y="980" width="1200" height="2" fill="url(#orangeGlow)" opacity="0.4"/>
  <rect x="460" y="986" width="1000" height="1" fill="#ff6b35" opacity="0.2"/>

  <!-- Dota 2 Custom Game label -->
  <text x="960" y="1040" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#4a5060" letter-spacing="6" text-transform="uppercase">DOTA 2 CUSTOM GAME</text>
</svg>
